<script>
  function loadSection(id, file) {
    return fetch(file)
      .then(function(res) {
        if (!res.ok) throw new Error('Failed to load ' + file);
        return res.text();
      })
      .then(function(html) {
        document.getElementById(id).innerHTML = html;
      })
      .catch(function(err) {
        console.warn(err);
      });
  }

  Promise.all([
    loadSection('section-about',  'sections/about.html'),
    loadSection('section-career', 'sections/career.html'),
    loadSection('section-kaggle', 'sections/kaggle.html'),
  ]);
</script>
